<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏模式选择</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- GSAP 动画库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00f0ff',
                        secondary: '#ff00a0',
                        accent: '#ffae00',
                        dark: '#0f0f1a',
                        light: '#f0f0ff'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        glow: {
                            '0%': { boxShadow: '0 0 5px theme(colors.primary), 0 0 10px theme(colors.primary)' },
                            '100%': { boxShadow: '0 0 10px theme(colors.primary), 0 0 20px theme(colors.primary), 0 0 30px theme(colors.primary)' }
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow-neon {
                text-shadow: 0 0 5px currentColor, 0 0 10px currentColor, 0 0 15px currentColor;
            }
            .border-glow {
                box-shadow: 0 0 5px theme(colors.primary), 0 0 10px theme(colors.primary);
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-10px) scale(1.05);
                z-index: 10;
            }
            .bg-blur {
                backdrop-filter: blur(10px);
            }
            .pet-emotion {
                transition: all 0.5s ease;
            }
            .pet-happy {
                transform: scale(1.1) rotate(5deg);
            }
            .pet-sad {
                transform: scale(0.9) rotate(-5deg);
            }
            .pet-neutral {
                transform: scale(1) rotate(0deg);
            }
            /* 成长动画 */
            .grow-up {
                animation: growUp 1.5s ease-in-out;
            }
            @keyframes growUp {
                0% { transform: scale(1); }
                50% { transform: scale(1.4); }
                100% { transform: scale(1.2); }
            }
        }
    </style>
</head>
<body class="bg-white text-dark min-h-screen overflow-x-hidden">
    <!-- 背景图 -->
    <div class="fixed inset-0 z-0">
        <div class="w-full h-full bg-gradient-to-br from-blue-50 to-purple-50"></div>
    </div>

    <!-- 主容器 -->
    <div class="relative z-10 min-h-screen flex flex-col">
        <!-- 顶部导航 -->
        <header class="bg-white/80 bg-blur border-b border-primary/30 py-4 px-6 shadow-md">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-2xl md:text-3xl font-bold text-primary text-shadow-neon">
                    <i class="fa fa-gamepad mr-2"></i>宠物冒险游戏
                </h1>
                <div class="flex items-center space-x-4">
                    <button id="soundToggle" class="text-primary hover:text-secondary transition-colors">
                        <i class="fa fa-volume-up text-xl"></i>
                    </button>
                    <button id="settingsBtn" class="text-primary hover:text-secondary transition-colors">
                        <i class="fa fa-cog text-xl"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="flex-grow container mx-auto px-4 py-8">
            <!-- 模式选择区域 -->
            <div id="modeSelection" class="py-8">
                <h2 class="text-3xl md:text-4xl font-bold text-center mb-8 text-secondary text-shadow-neon">
                    选择游戏模式
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 max-w-5xl mx-auto">
                    <!-- 单人模式 -->
                    <div class="mode-card card-hover bg-white/80 bg-blur rounded-xl border-2 border-primary/50 p-6 cursor-pointer shadow-lg" data-mode="single">
                        <div class="text-center mb-4">
                            <img src="https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/b3011b9155a849dc86b49f001c7ecdab~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202604191227473A1324A457EFC9D1B226&rrcfp=f06b921b&x-expires=1779164892&x-signature=zVmz9rik6x3PXCHwbOel0Xa2jE4%3D" 
                                 alt="单人模式" 
                                 class="w-32 h-32 mx-auto object-contain">
                        </div>
                        <h3 class="text-xl font-bold text-primary mb-2 text-center">单人模式</h3>
                        <p class="text-gray-600 text-center text-sm">独自与你的宠物开始冒险之旅，探索神秘世界</p>
                        <div class="mt-4 text-center">
                            <span class="inline-block px-3 py-1 bg-primary/20 text-primary rounded-full text-xs">
                                适合新手
                            </span>
                        </div>
                    </div>

                    <!-- 多人模式 -->
                    <div class="mode-card card-hover bg-white/80 bg-blur rounded-xl border-2 border-secondary/50 p-6 cursor-pointer shadow-lg" data-mode="multi">
                        <div class="text-center mb-4">
                            <img src="https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/b3011b9155a849dc86b49f001c7ecdab~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202604191227473A1324A457EFC9D1B226&rrcfp=f06b921b&x-expires=1779164892&x-signature=zVmz9rik6x3PXCHwbOel0Xa2jE4%3D" 
                                 alt="多人模式" 
                                 class="w-32 h-32 mx-auto object-contain">
                        </div>
                        <h3 class="text-xl font-bold text-secondary mb-2 text-center">多人模式</h3>
                        <p class="text-gray-600 text-center text-sm">与好友一起冒险，组队完成挑战，分享宠物故事</p>
                        <div class="mt-4 text-center">
                            <span class="inline-block px-3 py-1 bg-secondary/20 text-secondary rounded-full text-xs">
                                社交体验
                            </span>
                        </div>
                    </div>

                    <!-- 挑战模式 -->
                    <div class="mode-card card-hover bg-white/80 bg-blur rounded-xl border-2 border-accent/50 p-6 cursor-pointer shadow-lg" data-mode="challenge">
                        <div class="text-center mb-4">
                            <img src="https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/b3011b9155a849dc86b49f001c7ecdab~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202604191227473A1324A457EFC9D1B226&rrcfp=f06b921b&x-expires=1779164892&x-signature=zVmz9rik6x3PXCHwbOel0Xa2jE4%3D" 
                                 alt="挑战模式" 
                                 class="w-32 h-32 mx-auto object-contain">
                        </div>
                        <h3 class="text-xl font-bold text-accent mb-2 text-center">挑战模式</h3>
                        <p class="text-gray-600 text-center text-sm">接受极限挑战，测试你与宠物的默契和技巧</p>
                        <div class="mt-4 text-center">
                            <span class="inline-block px-3 py-1 bg-accent/20 text-accent rounded-full text-xs">
                                高难度
                            </span>
                        </div>
                    </div>

                    <!-- 休闲模式 -->
                    <div class="mode-card card-hover bg-white/80 bg-blur rounded-xl border-2 border-pink-400/50 p-6 cursor-pointer shadow-lg" data-mode="casual">
                        <div class="text-center mb-4">
                            <img src="https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/b3011b9155a849dc86b49f001c7ecdab~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202604191227473A1324A457EFC9D1B226&rrcfp=f06b921b&x-expires=1779164892&x-signature=zVmz9rik6x3PXCHwbOel0Xa2jE4%3D" 
                                 alt="休闲模式" 
                                 class="w-32 h-32 mx-auto object-contain">
                        </div>
                        <h3 class="text-xl font-bold text-pink-400 mb-2 text-center">休闲模式</h3>
                        <p class="text-gray-600 text-center text-sm">轻松愉快的体验，专注于宠物互动和装饰</p>
                        <div class="mt-4 text-center">
                            <span class="inline-block px-3 py-1 bg-pink-400/20 text-pink-400 rounded-full text-xs">
                                放松心情
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 宠物互动区域 (初始隐藏) -->
            <div id="petInteraction" class="hidden py-8">
                <div class="flex justify-between items-center mb-6">
                    <button id="backToModes" class="flex items-center text-primary hover:text-secondary transition-colors">
                        <i class="fa fa-arrow-left mr-2"></i> 返回模式选择
                    </button>
                    <div class="flex items-center space-x-4">
                        <div class="text-center">
                            <div class="text-accent text-xl font-bold" id="petHappiness">100</div>
                            <div class="text-xs text-gray-400">心情值</div>
                        </div>
                        <div class="text-center">
                            <div class="text-primary text-xl font-bold" id="petEnergy">100</div>
                            <div class="text-xs text-gray-400">体力值</div>
                        </div>
                        <div class="text-center">
                            <div class="text-secondary text-xl font-bold" id="petAge">1</div>
                            <div class="text-xs text-gray-400">年龄</div>
                        </div>
                    </div>
                </div>

                <!-- 宠物展示区 -->
                <div class="bg-white/80 bg-blur rounded-xl border border-primary/30 p-8 mb-8 text-center shadow-lg">
                    <div class="relative inline-block">
                        <div id="petCharacter" class="pet-emotion pet-neutral text-8xl mb-4">
                            🐱
                        </div>
                        <div id="petSpeech" class="absolute top-0 right-0 transform translate-x-1/2 -translate-y-1/2 bg-white/90 bg-blur border border-primary/50 rounded-lg px-4 py-2 text-sm max-w-xs shadow-lg">
                            主人，我准备好了！
                        </div>
                    </div>
                    <h3 class="text-2xl font-bold text-primary mb-2">小猫咪</h3>
                    <p class="text-gray-400">品种：英国短毛猫 | 年龄：<span id="petAgeText">1</span>岁</p>
                </div>

                <!-- 互动功能区 -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <!-- 喂食 -->
                    <div class="interaction-card card-hover bg-white/70 rounded-xl border border-pink-400/30 p-4 cursor-pointer" data-action="feed">
                        <div class="text-center mb-2">
                            <img src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/5347315326054cc081ce8d78a7789a5d~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202604191227473A1324A457EFC9D1B226&rrcfp=f06b921b&x-expires=1779164902&x-signature=ORFDGnO%2Ba1R51G7%2BUecXwCdqVCw%3D" 
                                 alt="喂食" 
                                 class="w-16 h-16 mx-auto object-contain">
                        </div>
                        <h4 class="text-center text-pink-400 font-medium">喂食</h4>
                    </div>

                    <!-- 洗澡 -->
                    <div class="interaction-card card-hover bg-white/70 rounded-xl border border-blue-400/30 p-4 cursor-pointer" data-action="bath">
                        <div class="text-center mb-2">
                            <img src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/5347315326054cc081ce8d78a7789a5d~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202604191227473A1324A457EFC9D1B226&rrcfp=f06b921b&x-expires=1779164902&x-signature=ORFDGnO%2Ba1R51G7%2BUecXwCdqVCw%3D" 
                                 alt="洗澡" 
                                 class="w-16 h-16 mx-auto object-contain">
                        </div>
                        <h4 class="text-center text-blue-400 font-medium">洗澡</h4>
                    </div>

                    <!-- 睡觉 -->
                    <div class="interaction-card card-hover bg-white/70 rounded-xl border border-purple-400/30 p-4 cursor-pointer" data-action="sleep">
                        <div class="text-center mb-2">
                            <img src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/5347315326054cc081ce8d78a7789a5d~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202604191227473A1324A457EFC9D1B226&rrcfp=f06b921b&x-expires=1779164902&x-signature=ORFDGnO%2Ba1R51G7%2BUecXwCdqVCw%3D" 
                                 alt="睡觉" 
                                 class="w-16 h-16 mx-auto object-contain">
                        </div>
                        <h4 class="text-center text-purple-400 font-medium">睡觉</h4>
                    </div>

                    <!-- 玩游戏 -->
                    <div class="interaction-card card-hover bg-white/70 rounded-xl border border-yellow-400/30 p-4 cursor-pointer" data-action="play">
                        <div class="text-center mb-2">
                            <img src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/5347315326054cc081ce8d78a7789a5d~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202604191227473A1324A457EFC9D1B226&rrcfp=f06b921b&x-expires=1779164902&x-signature=ORFDGnO%2Ba1R51G7%2BUecXwCdqVCw%3D" 
                                 alt="玩游戏" 
                                 class="w-16 h-16 mx-auto object-contain">
                        </div>
                        <h4 class="text-center text-yellow-400 font-medium">玩游戏</h4>
                    </div>
                </div>

                <!-- 外出按钮 -->
                <div class="mt-8 text-center">
                    <button id="goOutButton" class="bg-gradient-to-r from-primary to-secondary text-white font-bold py-3 px-8 rounded-full text-lg hover:scale-105 transition-transform border-glow animate-pulse-slow">
                        <i class="fa fa-paw mr-2"></i> 带宠物出门散步
                    </button>
                </div>
            </div>

            <!-- 外出散步区域 - 超写实真实街道版 -->
            <div id="outdoorArea" class="hidden py-8">
                <div class="flex justify-between items-center mb-6">
                    <button id="backToPet" class="flex items-center text-primary hover:text-secondary transition-colors">
                        <i class="fa fa-arrow-left mr-2"></i> 返回宠物互动
                    </button>
                    <div class="text-center">
                        <div class="text-primary text-xl font-bold">街上散步</div>
                        <div class="text-xs text-gray-400">时间：<span id="walkTime">00:00</span></div>
                    </div>
                </div>

                <!-- 真实城镇街道场景 -->
                <div class="bg-white/90 rounded-xl border border-primary/30 p-8 mb-8 shadow-lg">
                    <div class="relative h-72 md:h-[360px] w-full rounded-lg overflow-hidden">
                        <!-- 天空远景 -->
                        <div class="absolute top-0 left-0 w-full h-[55%] bg-gradient-to-b from-sky-100 to-sky-50"></div>
                        
                        <!-- 远处地平线树林 -->
                        <div class="absolute top-[52%] left-0 w-full h-[8%] bg-green-200 opacity-60"></div>
                        
                        <!-- 街道马路 -->
                        <div class="absolute top-[60%] left-0 w-full h-[22%] bg-gray-700"></div>
                        <!-- 马路白线 -->
                        <div class="absolute top-[64%] left-0 w-full h-[2px] bg-white/80"></div>
                        <div class="absolute top-[72%] left-0 w-full h-[2px] bg-white/80"></div>
                        
                        <!-- 右侧人行道 -->
                        <div class="absolute top-[58%] right-0 w-[28%] h-[24%] bg-gray-200"></div>
                        <!-- 左侧人行道 -->
                        <div class="absolute top-[58%] left-0 w-[28%] h-[24%] bg-gray-200"></div>

                        <!-- 沿街商铺楼房 -->
                        <!-- 左建筑1 -->
                        <div class="absolute top-[32%] left-[5%] w-[12%] h-[26%] bg-stone-100 rounded-t-md border border-stone-200"></div>
                        <div class="absolute top-[38%] left-[7%] w-[3%] h-[5%] bg-sky-50"></div>
                        <div class="absolute top-[45%] left-[7%] w-[3%] h-[5%] bg-sky-50"></div>
                        <!-- 左建筑2 -->
                        <div class="absolute top-[25%] left-[22%] w-[14%] h-[33%] bg-amber-50 rounded-t-md border border-amber-100"></div>
                        <div class="absolute top-[32%] left-[25%] w-[3.5%] h-[5.5%] bg-amber-100"></div>
                        <div class="absolute top-[40%] left-[25%] w-[3.5%] h-[5.5%] bg-amber-100"></div>
                        
                        <!-- 右建筑1 -->
                        <div class="absolute top-[28%] right-[8%] w-[13%] h-[30%] bg-blue-50 rounded-t-md border border-blue-100"></div>
                        <div class="absolute top-[35%] right-[11%] w-[3.5%] h-[5.5%] bg-blue-100"></div>
                        <div class="absolute top-[42%] right-[11%] w-[3.5%] h-[5.5%] bg-blue-100"></div>
                        <!-- 右建筑2 -->
                        <div class="absolute top-[35%] right-[25%] w-[10%] h-[23%] bg-green-50 rounded-t-md border border-green-100"></div>
                        
                        <!-- 路边路灯 -->
                        <div class="absolute top-[35%] left-[40%] w-[1.5%] h-[22%] bg-gray-600"></div>
                        <div class="absolute top-[33%] left-[39.5%] w-[2.5%] h-[2%] bg-amber-100 rounded-full"></div>
                        
                        <div class="absolute top-[35%] right-[38%] w-[1.5%] h-[22%] bg-gray-600"></div>
                        <div class="absolute top-[33%] right-[39.5%] w-[2.5%] h-[2%] bg-amber-100 rounded-full"></div>

                        <!-- 路边绿化小草丛 -->
                        <div class="absolute top-[57%] left-[35%] w-[4%] h-[3%] bg-green-300 rounded-full"></div>
                        <div class="absolute top-[57%] right-[35%] w-[4%] h-[3%] bg-green-300 rounded-full"></div>

                        <!-- 远处小车 -->
                        <div class="absolute top-[68%] right-[15%] w-[8%] h-[4%] bg-slate-400 rounded-md"></div>
                        <div class="absolute top-[68%] left-[18%] w-[7%] h-[3.5%] bg-slate-300 rounded-md"></div>

                        <!-- 宠物：在中间人行道逛街走路 -->
                        <div id="walkingPet" class="absolute bottom-[22%] left-1/2 transform -translate-x-1/2 text-5xl md:text-6xl animate-bounce">
                            🐱
                        </div>
                    </div>
                </div>

                <!-- 散步控制按钮 -->
                <div class="grid grid-cols-3 gap-4 max-w-md mx-auto">
                    <button id="walkLeft" class="bg-white/80 rounded-xl border border-primary/30 p-4 text-center hover:bg-primary/10 transition-colors shadow-sm">
                        <i class="fa fa-arrow-left text-2xl text-primary"></i>
                    </button>
                    <button id="walkStop" class="bg-white/80 rounded-xl border border-secondary/30 p-4 text-center hover:bg-secondary/10 transition-colors shadow-sm">
                        <i class="fa fa-stop text-2xl text-secondary"></i>
                    </button>
                    <button id="walkRight" class="bg-white/80 rounded-xl border border-primary/30 p-4 text-center hover:bg-primary/10 transition-colors shadow-sm">
                        <i class="fa fa-arrow-right text-2xl text-primary"></i>
                    </button>
                </div>

                <!-- 路上捡到物品 -->
                <div class="mt-8 bg-white/80 rounded-xl border border-accent/30 p-6 shadow-lg">
                    <h3 class="text-xl font-bold text-accent mb-4">街边发现的物品</h3>
                    <div id="foundItems" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="text-center text-gray-600">
                            <i class="fa fa-leaf text-2xl mb-2"></i>
                            <div class="text-sm">树叶</div>
                        </div>
                        <div class="text-center text-gray-600">
                            <i class="fa fa-bone text-2xl mb-2"></i>
                            <div class="text-sm">骨头</div>
                        </div>
                        <div class="text-center text-gray-600">
                            <i class="fa fa-star text-2xl mb-2"></i>
                            <div class="text-sm">星星</div>
                        </div>
                        <div class="text-center text-gray-600">
                            <i class="fa fa-gift text-2xl mb-2"></i>
                            <div class="text-sm">礼物</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 底部信息 -->
        <footer class="bg-white/80 border-t border-primary/30 py-4 px-6">
            <div class="container mx-auto text-center text-gray-400 text-sm">
                <p>宠物冒险游戏 &copy; 2024 - 与你的虚拟伙伴一起探索世界</p>
            </div>
        </footer>
    </div>

    <!-- 设置弹窗 -->
    <div id="settingsModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white border-2 border-primary/50 rounded-xl p-8 max-w-md w-full mx-4 shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-primary">设置</h3>
                <button id="closeSettings" class="text-gray-400 hover:text-primary">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 mb-2">音量</label>
                    <input type="range" class="w-full accent-primary">
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">画面质量</label>
                    <select class="w-full bg-gray-50 border border-primary/30 rounded px-3 py-2 text-dark">
                        <option>高</option>
                        <option selected>中</option>
                        <option>低</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">宠物类型</label>
                    <div class="grid grid-cols-2 gap-4">
                        <button class="bg-primary/20 border border-primary/50 rounded p-2 text-center">
                            🐱 猫咪
                        </button>
                        <button class="bg-gray-50 border border-primary/30 rounded p-2 text-center">
                            🐶 狗狗
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="mt-6 text-center">
                <button id="saveSettings" class="bg-primary text-white font-bold py-2 px-6 rounded hover:bg-primary/80 transition-colors">
                    保存设置
                </button>
            </div>
        </div>
    </div>

    <script>
        // 游戏状态
        const gameState = {
            currentScreen: 'modeSelection',
            pet: {
                type: 'cat',
                name: '小猫咪',
                happiness: 100,
                energy: 100,
                emotion: 'neutral',
                age: 1 // 年龄
            },
            soundEnabled: true,
            walking: false,
            walkTime: 0
        };

        // DOM 元素
        const elements = {
            modeSelection: document.getElementById('modeSelection'),
            petInteraction: document.getElementById('petInteraction'),
            outdoorArea: document.getElementById('outdoorArea'),
            modeCards: document.querySelectorAll('.mode-card'),
            backToModes: document.getElementById('backToModes'),
            backToPet: document.getElementById('backToPet'),
            interactionCards: document.querySelectorAll('.interaction-card'),
            petCharacter: document.getElementById('petCharacter'),
            petSpeech: document.getElementById('petSpeech'),
            petHappiness: document.getElementById('petHappiness'),
            petEnergy: document.getElementById('petEnergy'),
            petAge: document.getElementById('petAge'),
            petAgeText: document.getElementById('petAgeText'),
            goOutButton: document.getElementById('goOutButton'),
            walkingPet: document.getElementById('walkingPet'),
            walkLeft: document.getElementById('walkLeft'),
            walkRight: document.getElementById('walkRight'),
            walkStop: document.getElementById('walkStop'),
            walkTime: document.getElementById('walkTime'),
            soundToggle: document.getElementById('soundToggle'),
            settingsBtn: document.getElementById('settingsBtn'),
            settingsModal: document.getElementById('settingsModal'),
            closeSettings: document.getElementById('closeSettings'),
            saveSettings: document.getElementById('saveSettings')
        };

        // 宠物对话
        const petDialogues = {
            feed: [
                '谢谢主人的美食！',
                '真好吃，我最喜欢这个！',
                '肚子饱饱的，好开心～'
            ],
            bath: [
                '洗澡时间到啦！',
                '泡泡真好玩！',
                '洗干净了，香喷喷～'
            ],
            sleep: [
                '困困的，要睡觉觉了...',
                'zzz...做个好梦...',
                '睡醒了，精神百倍！'
            ],
            play: [
                '玩游戏最开心了！',
                '主人陪我玩，好幸福！',
                '这个游戏真有趣！'
            ],
            goOut: [
                '出门逛街散步咯！',
                '街上好热闹呀！',
                '我好想到处走走看看！'
            ],
            growUp: [
                '哇！我长大啦！',
                '谢谢主人照顾我～',
                '我又长大一岁啦！'
            ]
        };

        // 初始化
        function init() {
            // 模式选择卡片点击事件
            elements.modeCards.forEach(card => {
                card.addEventListener('click', () => {
                    const mode = card.dataset.mode;
                    selectGameMode(mode);
                });
            });

            // 返回按钮事件
            elements.backToModes.addEventListener('click', () => {
                switchScreen('modeSelection');
            });

            elements.backToPet.addEventListener('click', () => {
                stopWalking();
                switchScreen('petInteraction');
            });

            // 互动功能点击事件
            elements.interactionCards.forEach(card => {
                card.addEventListener('click', () => {
                    const action = card.dataset.action;
                    interactWithPet(action);
                });
            });

            // 外出散步按钮
            elements.goOutButton.addEventListener('click', () => {
                if (gameState.pet.energy > 20) {
                    startWalking();
                    switchScreen('outdoorArea');
                } else {
                    showPetSpeech('我好累，需要休息一下...');
                    changePetEmotion('sad');
                }
            });

            // 散步控制
            elements.walkLeft.addEventListener('click', () => {
                movePet('left');
            });

            elements.walkRight.addEventListener('click', () => {
                movePet('right');
            });

            elements.walkStop.addEventListener('click', () => {
                stopWalking();
            });

            // 设置按钮
            elements.settingsBtn.addEventListener('click', () => {
                elements.settingsModal.classList.remove('hidden');
            });

            elements.closeSettings.addEventListener('click', () => {
                elements.settingsModal.classList.add('hidden');
            });

            elements.saveSettings.addEventListener('click', () => {
                elements.settingsModal.classList.add('hidden');
                showPetSpeech('设置已保存！');
            });

            // 音效开关
            elements.soundToggle.addEventListener('click', () => {
                toggleSound();
            });

            // 更新UI
            updatePetStats();
            
            // 添加动画效果
            animateModeCards();
        }

        // 切换游戏模式
        function selectGameMode(mode) {
            console.log('选择游戏模式:', mode);
            
            // 根据模式设置不同的宠物和场景
            switch(mode) {
                case 'single':
                    gameState.pet.type = 'cat';
                    gameState.pet.name = '小猫咪';
                    elements.petCharacter.textContent = '🐱';
                    break;
                case 'multi':
                    gameState.pet.type = 'dog';
                    gameState.pet.name = '小狗狗';
                    elements.petCharacter.textContent = '🐶';
                    break;
                case 'challenge':
                    gameState.pet.type = 'fox';
                    gameState.pet.name = '小狐狸';
                    elements.petCharacter.textContent = '🦊';
                    break;
                case 'casual':
                    gameState.pet.type = 'rabbit';
                    gameState.pet.name = '小兔子';
                    elements.petCharacter.textContent = '🐰';
                    break;
            }
            
            // 显示欢迎信息
            showPetSpeech(`欢迎来到${getModeName(mode)}！我是你的伙伴${gameState.pet.name}！`);
            changePetEmotion('happy');
            
            // 切换到宠物互动界面
            switchScreen('petInteraction');
        }

        // 获取模式名称
        function getModeName(mode) {
            const names = {
                single: '单人模式',
                multi: '多人模式',
                challenge: '挑战模式',
                casual: '休闲模式'
            };
            return names[mode] || '未知模式';
        }

        // 切换界面
        function switchScreen(screen) {
            // 隐藏所有界面
            elements.modeSelection.classList.add('hidden');
            elements.petInteraction.classList.add('hidden');
            elements.outdoorArea.classList.add('hidden');
            
            // 显示目标界面
            switch(screen) {
                case 'modeSelection':
                    elements.modeSelection.classList.remove('hidden');
                    break;
                case 'petInteraction':
                    elements.petInteraction.classList.remove('hidden');
                    break;
                case 'outdoorArea':
                    elements.outdoorArea.classList.remove('hidden');
                    break;
            }
            
            gameState.currentScreen = screen;
        }

        // 与宠物互动
        function interactWithPet(action) {
            console.log('与宠物互动:', action);
            
            // 根据互动类型更新宠物状态
            switch(action) {
                case 'feed':
                    gameState.pet.happiness = Math.min(100, gameState.pet.happiness + 10);
                    gameState.pet.energy = Math.min(100, gameState.pet.energy + 5);
                    changePetEmotion('happy');
                    break;
                case 'bath':
                    gameState.pet.happiness = Math.max(0, gameState.pet.happiness - 5);
                    gameState.pet.energy = Math.max(0, gameState.pet.energy - 10);
                    changePetEmotion('neutral');
                    break;
                case 'sleep':
                    gameState.pet.happiness = Math.min(100, gameState.pet.happiness + 5);
                    gameState.pet.energy = 100;
                    changePetEmotion('neutral');
                    break;
                case 'play':
                    gameState.pet.happiness = Math.min(100, gameState.pet.happiness + 15);
                    gameState.pet.energy = Math.max(0, gameState.pet.energy - 15);
                    changePetEmotion('happy');
                    break;
            }
            
            // 显示宠物对话
            const dialogues = petDialogues[action] || ['...'];
            const randomDialogue = dialogues[Math.floor(Math.random() * dialogues.length)];
            showPetSpeech(randomDialogue);
            
            // 更新UI
            updatePetStats();
            
            // 添加互动动画
            addInteractionEffect(action);

            // 检查是否可以长大
            checkGrowUp();
        }

        // 检查是否满足长大条件：心情100 + 体力100
        function checkGrowUp() {
            if (gameState.pet.happiness === 100 && gameState.pet.energy === 100) {
                // 长大一岁
                gameState.pet.age += 1;
                
                // 播放成长动画
                elements.petCharacter.classList.add('grow-up');
                setTimeout(() => {
                    elements.petCharacter.classList.remove('grow-up');
                }, 1500);
                
                // 宠物说话
                const growTexts = petDialogues.growUp;
                const randomText = growTexts[Math.floor(Math.random() * growTexts.length)];
                showPetSpeech(randomText);
                
                // 更新年龄显示
                updatePetStats();
                
                // 长大之后重置状态
                setTimeout(() => {
                    gameState.pet.happiness = 80;
                    gameState.pet.energy = 80;
                    updatePetStats();
                }, 2000);
            }
        }

        // 显示宠物对话
        function showPetSpeech(text) {
            elements.petSpeech.textContent = text;
            elements.petSpeech.style.opacity = '1';
            
            // 3秒后隐藏
            setTimeout(() => {
                elements.petSpeech.style.opacity = '0.7';
            }, 3000);
        }

        // 改变宠物表情
        function changePetEmotion(emotion) {
            // 移除所有表情类
            elements.petCharacter.classList.remove('pet-happy', 'pet-sad', 'pet-neutral');
            
            // 添加新表情
            elements.petCharacter.classList.add(`pet-${emotion}`);
            gameState.pet.emotion = emotion;
        }

        // 更新宠物状态UI
        function updatePetStats() {
            elements.petHappiness.textContent = gameState.pet.happiness;
            elements.petEnergy.textContent = gameState.pet.energy;
            elements.petAge.textContent = gameState.pet.age;
            elements.petAgeText.textContent = gameState.pet.age;
            
            // 根据状态改变颜色
            if (gameState.pet.happiness < 30) {
                elements.petHappiness.className = 'text-red-400 text-xl font-bold';
            } else if (gameState.pet.happiness > 70) {
                elements.petHappiness.className = 'text-green-400 text-xl font-bold';
            } else {
                elements.petHappiness.className = 'text-accent text-xl font-bold';
            }
            
            if (gameState.pet.energy < 30) {
                elements.petEnergy.className = 'text-red-400 text-xl font-bold';
            } else if (gameState.pet.energy > 70) {
                elements.petEnergy.className = 'text-green-400 text-xl font-bold';
            } else {
                elements.petEnergy.className = 'text-primary text-xl font-bold';
            }
        }

        // 添加互动效果
        function addInteractionEffect(action) {
            const pet = elements.petCharacter;
            
            // 添加动画类
            pet.classList.add('animate-bounce');
            
            // 1秒后移除
            setTimeout(() => {
                pet.classList.remove('animate-bounce');
            }, 1000);
        }

        // 开始散步
        function startWalking() {
            gameState.walking = true;
            gameState.walkTime = 0;
            gameState.pet.energy = Math.max(0, gameState.pet.energy - 20);
            
            // 更新散步时间
            updateWalkTime();
            elements.walkingPet.style.animation = 'bounce 1s infinite';
            
            // 显示宠物对话
            const dialogues = petDialogues.goOut;
            const randomDialogue = dialogues[Math.floor(Math.random() * dialogues.length)];
            showPetSpeech(randomDialogue);
            
            // 更新状态
            updatePetStats();
        }

        // 停止散步
        function stopWalking() {
            gameState.walking = false;
            elements.walkingPet.style.animation = 'none';
        }

        // 移动宠物
        function movePet(direction) {
            if (!gameState.walking) return;
            
            const pet = elements.walkingPet;
            const currentLeft = parseInt(pet.style.left) || 50;
            
            if (direction === 'left') {
                pet.style.left = Math.max(10, currentLeft - 10) + '%';
            } else {
                pet.style.left = Math.min(90, currentLeft + 10) + '%';
            }
            
            // 消耗体力
            gameState.pet.energy = Math.max(0, gameState.pet.energy - 1);
            updatePetStats();
        }

        // 更新散步时间
        function updateWalkTime() {
            if (!gameState.walking) return;
            
            gameState.walkTime++;
            const minutes = Math.floor(gameState.walkTime / 60);
            const seconds = gameState.walkTime % 60;
            elements.walkTime.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // 每秒更新一次
            setTimeout(updateWalkTime, 1000);
        }

        // 切换音效
        function toggleSound() {
            gameState.soundEnabled = !gameState.soundEnabled;
            
            if (gameState.soundEnabled) {
                elements.soundToggle.innerHTML = '<i class="fa fa-volume-up text-xl"></i>';
            } else {
                elements.soundToggle.innerHTML = '<i class="fa fa-volume-off text-xl"></i>';
            }
        }

        // 模式卡片动画
        function animateModeCards() {
            elements.modeCards.forEach((card, index) => {
                gsap.from(card, {
                    y: 50,
                    opacity: 0,
                    duration: 0.8,
                    delay: index * 0.2,
                    ease: "back.out(1.7)"
                });
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
